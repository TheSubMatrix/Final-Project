name: Generate Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'Assets/Scripts/**.cs'
      - 'Doxyfile'

jobs:
  generate-documentation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Commit
        uses: actions/checkout@v6.0.2

      - name: Install Doxygen
        run: sudo apt-get install -y doxygen

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Push Documentation
        run: |
          if [ ! -d "docs/html" ]; then
            echo "No documentation generated, skipping push."
            exit 0
          fi
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://x-access-token:${{ secrets.DOCS_DEPLOY_TOKEN }}@github.com/TheSubMatrix/Final-Project-Documentation.git docs-repo
          cp -r docs/html/* docs-repo/
          cd docs-repo
          git add .
          git diff --staged --quiet || git commit -m "docs: update documentation"
          git push